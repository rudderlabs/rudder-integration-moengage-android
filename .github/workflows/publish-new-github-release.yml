name: Publish new github release

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:
    inputs:
      version:
        required: true

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: read # to read repository contents
    name: Publish new release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (startsWith(github.event.pull_request.head.ref, 'release/') && github.event.pull_request.merged == true) # only merged pull requests must trigger this job
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits, tags, and releases

      - name: Extract version from branch name (for release branches)
        id: extract-version
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          BRANCH_NAME="$PR_HEAD_REF"
          if [ "$BRANCH_NAME" = "" ]; then BRANCH_NAME="$INPUT_VERSION"
          fi
          echo "BRANCH_NAME considered: ${BRANCH_NAME}"
          VERSION=${BRANCH_NAME#release/}

          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 16

      - name: Create verified tag via API
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/v${{ steps.extract-version.outputs.release_version }}" \
            -f sha="${{ github.sha }}"

      - name: Create GitHub Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CONVENTIONAL_GITHUB_RELEASER_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          DEBUG=conventional-github-releaser npx conventional-github-releaser -p angular

      - name: Delete release branch
        uses: koj-co/delete-merged-action@63a03c35810a8a7d4840d18793c0f68ff8b59450 # master
        if: startsWith(github.event.pull_request.head.ref, 'release/')
        with:
          branches: 'release/*'
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
